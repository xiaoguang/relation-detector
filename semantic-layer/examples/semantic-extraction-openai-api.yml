semanticExtraction:
  # Production mode. This calls an OpenAI-compatible Responses API.
  provider: openai-api
  input: relation-detector/target/sample-data-parser-cli/results/mysql-v8_0-full-derived-fresh.json
  output: semantic-layer/target/semantic-extraction/openai-api-sp-rebuild-sales-fact
  focus: ROUTINE:erp_system.sp_rebuild_sales_fact
  model: gpt-5.5
  reasoningEffort: high
  maxOutputTokens: 12000
  baseUrl: https://api.openai.com/v1
  apiKeyEnv: OPENAI_API_KEY
  # 0 means unlimited. Set positive max* values only for an intentional preview prompt.
  maxRelationships: 0
  maxLineage: 0
  maxNamingEvidence: 0
